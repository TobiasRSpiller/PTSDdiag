url: https://tobiasrspiller.github.io/PTSDdiag/

template:
  bootstrap: 5
  bootswatch: flatly
  bslib:
    base_font: {google: "Roboto"}
    heading_font: {google: "Roboto Slab"}
    code_font: {google: "JetBrains Mono"}
    pkgdown-nav-height: 70px
  opengraph:
    image:
      src: man/figures/logo.png
    twitter:
      creator: "@TobiasSpiller"
      card: summary

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [search, github]
  components:
    home:
      icon: fas fa-home fa-lg
      href: index.html
      aria-label: Home
    reference:
      text: Reference
      href: reference/index.html
    articles:
      text: Articles
      menu:
      - text: "Quick Start"
        href: articles/quickstart.html
      - text: "Full Internal Analysis"
        href: articles/internal_analysis.html
      - text: "Joining diagnoses to demographics"
        href: articles/id_column_workflow.html
      - text: "---"
      - text: "External Validation (PCL-5)"
        href: articles/external_validation_pcl5.html
      - text: "External Validation (CAPS-5)"
        href: articles/external_validation_caps5.html
    news:
      text: News
      href: news/index.html
    github:
      icon: fab fa-github fa-lg
      href: https://github.com/TobiasRSpiller/PTSDdiag
      aria-label: GitHub

home:
  title: PTSDdiag — PTSD Diagnostic Criteria Analysis
  description: >
    Identify optimal subsets of PCL-5 items that maintain diagnostic
    accuracy while reducing assessment burden.
  links:
  - text: Quick Start
    href: articles/quickstart.html
  - text: Full Internal Analysis
    href: articles/internal_analysis.html
  - text: External Validation (PCL-5)
    href: articles/external_validation_pcl5.html
  - text: External Validation (CAPS-5)
    href: articles/external_validation_caps5.html
  - text: Function Reference
    href: reference/index.html
  - text: Publication
    href: https://doi.org/10.31219/osf.io/6rk72_v1

articles:
- title: "Getting Started"
  desc: "Core workflows for new users"
  contents:
  - quickstart
  - internal_analysis
  - id_column_workflow
- title: "External Validation"
  desc: "Test optimised criteria on independent datasets"
  contents:
  - external_validation_pcl5
  - external_validation_caps5

reference:
  - title: Data Preparation
    desc: Functions for preparing and standardizing PCL-5 and CAPS-5 data
    contents:
    - rename_ptsd_columns
    - rename_caps5_columns
    - binarize_data

  - title: Diagnostic Scoring
    desc: Functions for calculating PTSD diagnoses and total scores
    contents:
    - calculate_ptsd_total
    - create_ptsd_diagnosis_binarized
    - create_ptsd_diagnosis_nonbinarized

  - title: Analysis Functions
    desc: Functions for analyzing optimal symptom combinations
    contents:
    - optimize_combinations
    - optimize_combinations_clusters
    - apply_symptom_combinations
    - analyze_best_six_symptoms_four_required
    - analyze_best_six_symptoms_four_required_clusters

  - title: Import/Export
    desc: Functions for sharing symptom combinations across research groups
    contents:
    - write_combinations
    - read_combinations

  - title: Summary and Reporting
    desc: Functions for creating summaries and comparing diagnostic approaches
    contents:
    - summarize_ptsd
    - summarize_ptsd_changes
    - create_readable_summary
    - create_icd11_diagnosis
    - create_caps5_diagnosis
    - compare_diagnostic_systems

  - title: Validation
    desc: Model validation methods
    contents:
    - holdout_validation
    - cross_validation

  - title: Datasets
    desc: Example and simulated datasets
    contents:
    - simulated_ptsd
    - simulated_ptsd_genpop

authors:
  Laura Weidmann:
    href: https://github.com/WeidmannL
  Tobias R. Spiller:
    href: https://github.com/TobiasRSpiller
  Flavio A. Schüepp:
    href: https://github.com/flavioschuepp

footer:
  structure:
    left: developed_by
    right: built_with
